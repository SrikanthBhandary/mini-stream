syntax = "proto3";

package mini_stream;
option go_package = "./pb";

service StreamService{
    rpc Ingest(IngestRequest) returns (IngestResponse);
    rpc Read(ReadRequest) returns (ReadResponse);
}

message IngestRequest {
  string key = 1;
  string payload = 2;
}

message IngestResponse {
  uint64 seq_num = 1;
}

message ReadRequest {
  int32 shard_id = 1;
  uint64 seq_num = 2;
}

message ReadResponse {
  string payload = 1;
}